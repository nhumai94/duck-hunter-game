let audioCtx=null,soundOn=true;
function initAudio(){if(!audioCtx)audioCtx=new(window.AudioContext||window.webkitAudioContext)()}
function toggleSound(){soundOn=!soundOn;document.getElementById('soundBtn').textContent=soundOn?'🔊 ON':'🔇 OFF'}
function snd(type,freq,dur,vol,wave){if(!soundOn||!audioCtx)return;const o=audioCtx.createOscillator();o.type=wave||'sine';o.frequency.setValueAtTime(freq,audioCtx.currentTime);if(type==='down')o.frequency.exponentialRampToValueAtTime(Math.max(20,freq*0.3),audioCtx.currentTime+dur);if(type==='up')o.frequency.exponentialRampToValueAtTime(freq*3,audioCtx.currentTime+dur);const g=audioCtx.createGain();g.gain.setValueAtTime(vol||0.15,audioCtx.currentTime);g.gain.exponentialRampToValueAtTime(0.001,audioCtx.currentTime+dur);o.connect(g);g.connect(audioCtx.destination);o.start();o.stop(audioCtx.currentTime+dur)}
function noise(dur,vol,freq){if(!soundOn||!audioCtx)return;const buf=audioCtx.createBuffer(1,audioCtx.sampleRate*dur,audioCtx.sampleRate),d=buf.getChannelData(0);for(let i=0;i<d.length;i++)d[i]=(Math.random()*2-1)*Math.exp(-i/(d.length*0.12));const src=audioCtx.createBufferSource();src.buffer=buf;const filt=audioCtx.createBiquadFilter();filt.type='lowpass';filt.frequency.value=freq||900;const g=audioCtx.createGain();g.gain.setValueAtTime(vol||0.7,audioCtx.currentTime);g.gain.exponentialRampToValueAtTime(0.01,audioCtx.currentTime+dur);src.connect(filt);filt.connect(g);g.connect(audioCtx.destination);src.start();src.stop(audioCtx.currentTime+dur)}
// Per-weapon shot sounds
function playWeaponSound(id){
  if(!soundOn||!audioCtx)return;
  switch(id){
    case'pistol':noise(0.12,0.5,900);snd('down',180,0.1,0.4);break;
    case'rifle':noise(0.14,0.6,1100);snd('down',220,0.12,0.4);break;
    case'shotgun':noise(0.2,0.7,600);snd('down',100,0.18,0.5);break;
    case'smg':noise(0.06,0.35,1400);break;
    case'blaster':noise(0.25,0.8,400);snd('down',80,0.25,0.6);break;
    case'flame':snd('down',300,0.3,0.3,'sawtooth');noise(0.2,0.3,500);break;
    case'ice':snd('up',1200,0.25,0.25);snd('up',1800,0.2,0.15);break;
    case'plasma':snd('up',700,0.12,0.2,'square');snd('',1100,0.1,0.12);break;
    case'dragon':noise(0.3,0.7,350);snd('down',120,0.35,0.6);break;
    case'diamond':snd('up',1600,0.3,0.25,'sawtooth');snd('up',2400,0.2,0.15);snd('',3200,0.15,0.1);break;
    default:noise(0.12,0.5,900);
  }
}

let ownedWeapons=['pistol'],equippedWeapon='pistol',weaponUpgrades={},coins=0;
function initWeapons(){ownedWeapons=['pistol'];equippedWeapon='pistol';weaponUpgrades={pistol:{dmg:0,ammo:0,rate:0}};coins=0}
function getWeaponBase(id){return WEAPONS.find(w=>w.id===id)}
function getCurrentWeapon(){return applyWeaponStats(equippedWeapon)}
function applyWeaponStats(id){
  const base=getWeaponBase(id);const up=weaponUpgrades[id]||{dmg:0,ammo:0,rate:0};
  return{...base,
    dmg:Math.round(base.dmg*(1+up.dmg*0.15)),
    ammo:base.ammo+up.ammo*3,
    fireRate:Math.max(3,base.fireRate-up.rate),
    upgradeLevel:up.dmg+up.ammo+up.rate, ups:up};
}
function getUpgradeCost(id,stat){const up=weaponUpgrades[id]||{dmg:0,ammo:0,rate:0};return Math.floor(getWeaponBase(id).price*0.25+120)*(1+(up[stat]||0))}
function buyWeapon(id){const w=getWeaponBase(id);if(!w||ownedWeapons.includes(id)||coins<w.price)return false;coins-=w.price;ownedWeapons.push(id);weaponUpgrades[id]={dmg:0,ammo:0,rate:0};equippedWeapon=id;{const cw=getCurrentWeapon();maxShots=cw.ammo;shots=cw.ammo;maxReserveAmmo=cw.ammo*3;reserveAmmo=Math.min(maxReserveAmmo,reserveAmmo+cw.ammo)}playBuy();return true}
function equipWeapon(id){if(!ownedWeapons.includes(id))return;equippedWeapon=id;const w=getCurrentWeapon();maxShots=w.ammo;if(shots>maxShots)shots=maxShots;maxReserveAmmo=w.ammo*3;if(reserveAmmo>maxReserveAmmo)reserveAmmo=maxReserveAmmo;isReloading=false;playBuy()}
function upgradeWeapon(id,stat){const up=weaponUpgrades[id];if(!up||up[stat]>=5)return false;const cost=getUpgradeCost(id,stat);if(coins<cost)return false;coins-=cost;up[stat]++;playUpgrade();return true}

// Per-weapon reload time (ms) and ammo cost multiplier (stronger guns = pricier/slower)
const WEAPON_AMMO={
  pistol:{reloadTime:700, costMul:1.0},
  rifle:{reloadTime:900, costMul:1.2},
  shotgun:{reloadTime:1100,costMul:1.4},
  smg:{reloadTime:800, costMul:1.1},
  blaster:{reloadTime:1500,costMul:1.8},
  flame:{reloadTime:1300,costMul:2.0},
  ice:{reloadTime:1600,costMul:2.2},
  plasma:{reloadTime:900, costMul:2.5},
  dragon:{reloadTime:1800,costMul:3.0},
  diamond:{reloadTime:1400,costMul:4.0},
};
const AMMO_PACKS=[
  {id:'small', name:'Small Ammo Pack', amount:10, price:100},
  {id:'medium',name:'Medium Ammo Pack',amount:30, price:250},
  {id:'large', name:'Large Ammo Pack', amount:70, price:500},
  {id:'boss',  name:'Boss Ammo Pack',  amount:120,price:900},
];
// Ammo state. `shots`=current magazine, `maxShots`=magazine size, plus a reserve pool.
let reserveAmmo=0, maxReserveAmmo=36;
let isReloading=false, reloadStart=0, reloadDur=700;
let ammoMsg='', ammoMsgTimer=0;
let emergencyUses=0, emergencyCd=0; // boss-only emergency ammo drop
function getWeaponAmmoCfg(){return WEAPON_AMMO[equippedWeapon]||WEAPON_AMMO.pistol}
function reserveCap(){return getCurrentWeapon().ammo*3}
function showAmmoMsg(t){ammoMsg=t;ammoMsgTimer=90}
function initAmmoSystem(){const w=getCurrentWeapon();maxShots=w.ammo;shots=w.ammo;maxReserveAmmo=w.ammo*3;reserveAmmo=w.ammo;isReloading=false;emergencyUses=0;emergencyCd=0}

// Buy a fixed ammo pack -> adds to reserve (price scaled by weapon costMul)
function buyAmmoPack(packId){
  const pack=AMMO_PACKS.find(p=>p.id===packId);if(!pack)return;
  const cost=Math.floor(pack.price*getWeaponAmmoCfg().costMul);
  if(reserveAmmo>=maxReserveAmmo){showAmmoMsg('Ammo Full');return}
  if(coins<cost){showAmmoMsg('Not enough coins');return}
  coins-=cost;reserveAmmo=Math.min(maxReserveAmmo,reserveAmmo+pack.amount);playBuy();showAmmoMsg('+'+pack.amount+' ammo')
}
// Full reload: fill magazine + top reserve, cost based on missing ammo
function buyFullReload(){
  const w=getCurrentWeapon();const missing=(maxShots-shots)+(maxReserveAmmo-reserveAmmo);
  if(missing<=0){showAmmoMsg('Ammo Full');return}
  const cost=Math.floor(missing*10*getWeaponAmmoCfg().costMul/3);
  if(coins<cost){showAmmoMsg('Not enough coins');return}
  coins-=cost;shots=maxShots;reserveAmmo=maxReserveAmmo;playUpgrade();showAmmoMsg('FULL RELOAD!')
}
function fullReloadCost(){const w=getCurrentWeapon();const missing=(maxShots-shots)+(maxReserveAmmo-reserveAmmo);return Math.floor(missing*10*getWeaponAmmoCfg().costMul/3)}

// ===== RELOAD MECHANIC =====
function canReload(){return reserveAmmo>0&&shots<maxShots&&!isReloading}
function startReload(){if(!canReload())return;isReloading=true;reloadStart=Date.now();reloadDur=getWeaponAmmoCfg().reloadTime}
function finishReload(){const needed=maxShots-shots;const amt=Math.min(needed,reserveAmmo);shots+=amt;reserveAmmo-=amt;isReloading=false}
function reloadWeapon(){startReload()}

// ===== EMERGENCY AMMO DROP (boss only) =====
function useEmergencyAmmoDrop(){
  if(phase!=='boss')return;
  if(emergencyUses>=2){showAmmoMsg('No drops left');return}
  if(emergencyCd>0){showAmmoMsg('Drop on cooldown');return}
  if(coins<500){showAmmoMsg('Not enough coins');return}
  coins-=500;emergencyUses++;emergencyCd=600; // ~10s at 60fps
  reserveAmmo=Math.min(maxReserveAmmo,reserveAmmo+20);
  if(shots<maxShots){const a=Math.min(maxShots-shots,reserveAmmo);shots+=a;reserveAmmo-=a}
  playUpgrade();addFloat(W/2,200,'+20 AMMO!','#FF9800','#E65100');showAmmoMsg('Emergency Ammo!')
}

// Cosmetic tracer that flies from muzzle to target (hit already applied = responsive)
function createWeaponBullet(sx,sy,tx,ty,w){
  const ang=Math.atan2(ty-sy,tx-sx),sp=w.bulletSpeed;
  const dist=Math.hypot(tx-sx,ty-sy);
  bullets.push({x:sx,y:sy,tx,ty,vx:Math.cos(ang)*sp,vy:Math.sin(ang)*sp,
    color:w.bullet,style:w.shape,life:Math.ceil(dist/sp)+2,maxLife:Math.ceil(dist/sp)+2,
    special:w.special,trail:[]});
}
function updateWeaponParticles(){
  bullets=bullets.filter(b=>{
    b.trail.push({x:b.x,y:b.y});if(b.trail.length>6)b.trail.shift();
    b.x+=b.vx;b.y+=b.vy;b.life--;
    return b.life>0;
  });
}
function drawWeaponParticles(){
  bullets.forEach(b=>{
    // trail
    for(let i=0;i<b.trail.length;i++){const t=b.trail[i],a=(i/b.trail.length)*0.6;ctx.globalAlpha=a;ctx.fillStyle=b.color;ctx.beginPath();ctx.arc(t.x,t.y,2+i*0.4,0,Math.PI*2);ctx.fill()}
    ctx.globalAlpha=1;
    // bullet head per style
    if(b.style==='ice'||b.style==='diamond'){ // beam-like
      ctx.strokeStyle=b.color;ctx.lineWidth=3;ctx.globalAlpha=.8;
      ctx.beginPath();ctx.moveTo(b.x,b.y);ctx.lineTo(b.x-b.vx*1.5,b.y-b.vy*1.5);ctx.stroke();ctx.globalAlpha=1;
      ctx.fillStyle='#FFF';ctx.beginPath();ctx.arc(b.x,b.y,3,0,Math.PI*2);ctx.fill();
    }else if(b.style==='dragon'||b.style==='flame'){ // fireball
      ctx.fillStyle='#FF6600';ctx.beginPath();ctx.arc(b.x,b.y,b.style==='dragon'?7:5,0,Math.PI*2);ctx.fill();
      ctx.fillStyle='#FFD700';ctx.beginPath();ctx.arc(b.x,b.y,b.style==='dragon'?4:3,0,Math.PI*2);ctx.fill();
    }else if(b.style==='plasma'){
      ctx.shadowColor=b.color;ctx.shadowBlur=8;ctx.fillStyle=b.color;ctx.beginPath();ctx.arc(b.x,b.y,4,0,Math.PI*2);ctx.fill();ctx.shadowBlur=0;
    }else if(b.style==='blaster'){
      ctx.fillStyle=b.color;ctx.beginPath();ctx.arc(b.x,b.y,6,0,Math.PI*2);ctx.fill();
    }else{
      ctx.fillStyle=b.color;ctx.beginPath();ctx.arc(b.x,b.y,3,0,Math.PI*2);ctx.fill();
    }
  });
}

// ===== SHOOTING (weapon-aware) =====
function applyDamageToTarget(d,w,hp){
  // returns true if killed. Handles crit/burn/slow/splash on a duck/minion
  let dmg=w.dmg;let crit=false;
  if(w.special==='crit'&&Math.random()<0.1){dmg*=2;crit=true}
  d.hp-=dmg;
  if(w.special==='slow')d.slow=120;
  if(w.special==='burn'){d.burn=120;d.burnTick=0}
  if(crit){addFloat(d.x,d.y-25,'CRIT!','#18FFFF','#0066FF');playCrit()}
  if(d.hp<=0){
    d.alive=false;d.falling=true;d.fallV=0;
    // splash: damage nearby ducks
    if(w.special==='splash'){addShock(d.x,d.y,75,'rgba(255,100,0,0.6)');playExplosion();ducks.forEach(o=>{if(o!==d&&o.alive&&!o.falling&&!o.gone&&Math.hypot(o.x-d.x,o.y-d.y)<75){o.hp-=Math.ceil(w.dmg*0.5);if(o.hp<=0){o.alive=false;o.falling=true;o.fallV=0;kills++;score+=50*round}}})}
    return true;
  }
  return false;
}

function shootWithWeapon(px,py){
  initAudio();
  if(phase==='title'||phase==='gameOver'){startGame();return}
  if(phase==='shop'){handleShopClick(px,py);return}
  if(phase==='playing'||phase==='boss'){
    // Reload button
    const rb=drawReloadButton.rect;if(rb&&px>rb.x&&px<rb.x+rb.w&&py>rb.y&&py<rb.y+rb.h){reloadWeapon();return}
  }
  if(phase==='boss'){
    const eb=drawEmergencyButton.rect;if(eb&&px>eb.x&&px<eb.x+eb.w&&py>eb.y&&py<eb.y+eb.h){useEmergencyAmmoDrop();return}
    const sy=H-145;for(let i=0;i<3;i++){if(px>15+i*90&&px<95+i*90&&py>sy&&py<sy+30){useSkill(i);return}}
  }
  if(phase!=='playing'&&phase!=='boss')return;
  if(fireCooldown>0||isReloading)return;

  const w=getCurrentWeapon();
  // Ammo priority: 1) magazine 2) reload from reserve 3) HP ammo (boss only)
  let hpAmmoShot=false;
  if(shots<=0){
    if(reserveAmmo>0){startReload();showAmmoMsg('Reloading...');return}
    if(phase==='boss'&&playerHP>0){hpAmmoShot=true}
    else{showAmmoMsg('OUT OF AMMO!');return}
  }
  fireCooldown=rapidFireActive>0?Math.max(2,Math.floor(w.fireRate*0.4)):w.fireRate;
  if(hpAmmoShot){
    // costs 15 HP per shot when no ammo left in boss round
    addFloat(W/2-40,mouseY-30,'-15 HP AMMO','#FF5252','#B71C1C');
    playerHP=Math.max(0,playerHP-15);playerHitFlash=20;
    if(playerHP<=0){phase='gameOver';playGameOver();return}
  } else {
    shots--;
  }
  gunRecoil=w.special==='shake'?-12:-7;gunAngle=-.06;
  playWeaponSound(w.id);
  // muzzle position (approx gun tip)
  const ang=Math.atan2(py-(H-105),px-W/2);
  const mx=W/2+Math.cos(ang)*70,my=(H-105)+Math.sin(ang)*70;
  createMuzzleFlash(mx,my,w.flash);
  createWeaponBullet(mx,my,px,py,w);
  if(w.special==='shake')shake(8);else shake(3);

  // hit points (shotgun = multiple pellets)
  const hitPts=[{x:px,y:py}];
  if(w.spread>0)for(let i=0;i<w.spread;i++)hitPts.push({x:px+(Math.random()-.5)*70,y:py+(Math.random()-.5)*70});

  if(phase==='playing'){
    let hitAny=false;
    for(const hpP of hitPts){for(let d of ducks){if(!d.alive||d.falling||d.gone)continue;if(Math.hypot(d.x-hpP.x,d.y-hpP.y)<d.sz+14){
      const killed=applyDamageToTarget(d,w,hpP);
      createImpactEffect(d.x,d.y,w);
      if(killed){combo++;if(combo>bestCombo)bestCombo=combo;const cm=Math.min(combo,5),pts=100*round*cm;score+=pts;kills++;coinComboTimer=90;coinComboMult=combo>=6?3:combo>=3?2:1;const coinGain=Math.floor((10+round*3)*coinComboMult+(combo>=3?combo*5:0));coins+=coinGain;addP(d.x,d.y,18);addStarBurst(d.x,d.y);shake(5);addFloat(d.x,d.y-10,combo>=3?'+'+pts+' x'+combo+'!':'+'+pts,combo>=3?'#FF69B4':'#FFD700');if(coinComboMult>1)addFloat(d.x,d.y+18,'🪙x'+coinComboMult,'#FFD700','#FF8F00');playHit();if(combo>=3)playCombo()}
      hitAny=true;break}}}
    if(!hitAny){combo=0;if(shots<=0)playMiss()}
  }

  if(phase==='boss'&&boss&&boss.alive){
    let hitAny=false;
    for(const hpP of hitPts){
      if(Math.hypot(boss.x-hpP.x,boss.y-hpP.y)<boss.sz+15){
        let dmg=w.dmg;let crit=false;
        if(rapidFireActive>0)dmg*=2;
        if(w.special==='crit'&&Math.random()<0.1){dmg*=2;crit=true}
        boss.hp-=dmg;boss.flashTimer=8;hitAny=true;
        if(w.special==='burn'){boss.burn=180;boss.burnTick=0}
        if(w.special==='slow')boss.slow=120;
        if(w.special==='splash'){addShock(boss.x,boss.y,90,'rgba(255,100,0,0.6)');playExplosion();boss.minions.forEach(m=>{if(m.alive&&!m.falling){m.hp-=2;if(m.hp<=0){m.alive=false;m.falling=true;m.fallV=0}}})}
        createImpactEffect(boss.x+Math.random()*20-10,boss.y+Math.random()*20-10,w);
        addFloat(boss.x,boss.y-boss.sz-10,(crit?'CRIT -':'-')+dmg,crit?'#18FFFF':'#FF4444','#FF0000');if(crit)playCrit();
        shake(4);playHit();
        if(Math.random()<0.12)spawnPickup(boss.x,boss.y);
        if(boss.hp<=0){bossDeath();return}break;
      }
      for(let mn of boss.minions){if(!mn.alive||mn.falling||mn.gone)continue;if(Math.hypot(mn.x-hpP.x,mn.y-hpP.y)<mn.sz+12){mn.hp-=w.dmg;if(mn.hp<=0){mn.alive=false;mn.falling=true;mn.fallV=0;score+=50*round;coins+=5}createImpactEffect(mn.x,mn.y,w);hitAny=true;break}}
    }
  }
}

// ===== UPDATE =====
function update(){
  tick++;
  if(fireCooldown>0)fireCooldown--;
  if(ammoMsgTimer>0)ammoMsgTimer--;
  if(emergencyCd>0)emergencyCd--;
  if(isReloading&&Date.now()-reloadStart>=reloadDur)finishReload();
  // Auto-fire for SMG/Plasma when mouse held
  if(mouseDown&&(phase==='playing'||phase==='boss')){const w=getCurrentWeapon();if(w.special==='auto'&&fireCooldown<=0&&shots>0)shootWithWeapon(mouseX,mouseY)}
  particles=particles.filter(p=>{p.x+=p.vx;p.y+=p.vy;p.vy+=0.12;p.vx*=0.98;p.life--;return p.life>0});
  floats=floats.filter(f=>tick-f.startTick<50);
  shockwaves=shockwaves.filter(s=>{s.r+=(s.maxR-s.r)*0.15;s.life-=0.035;return s.life>0});
  updateWeaponParticles();
  gunRecoil*=0.8;gunAngle*=0.85;
  if(playerHitFlash>0)playerHitFlash--;
  if(coinComboTimer>0){coinComboTimer--;if(coinComboTimer<=0)coinComboMult=1}
  if(screenShake.t>0){screenShake.t--;screenShake.x=(Math.random()-.5)*screenShake.intensity;screenShake.y=(Math.random()-.5)*screenShake.intensity}else{screenShake.x=0;screenShake.y=0}

  if(phase==='bossWarn'){bossWarnTimer--;if(bossWarnTimer<=0)startBossRound();return}
  if(phase==='dogAnim'){dogTimer--;if(dogTimer<=0){if(dogVariant==='sniff'){if(isBossRound(round)){phase='bossWarn';bossWarnTimer=120;playBossWarn()}else beginRound()}else if(dogVariant==='hold'){round++;openShop()}else{phase='gameOver';playGameOver()}}}

  if(phase==='playing'){
    const total=getDuckCount(round),interval=getSpawnInterval(round);
    spawnTimer++;
    if(spawnTimer>=interval&&spawnCount<total){ducks.push(makeDuck(round));spawnCount++;spawnTimer=0}
    const fleeTime=getFleeTime(round);
    ducks.forEach(d=>{
      if(d.gone)return;

      if(d.pattern==='zigzag')d.vy=Math.sin(d.patTick*.08)*3;

      if(Date.now()-d.born>fleeTime){d.y-=2.5+round*.3;if(d.y<-60){d.gone=true;escaped++;combo=0;playFlyAway()}}
      if(!d.falling&&d.alive&&tick%3===0)d.trail.push({x:d.x,y:d.y});if(d.trail.length>8)d.trail.shift();
    });

  }

    if(boss.slow>0)boss.slow--;

    boss.minions=boss.minions.filter(m=>!m.gone);
    // Enrage + attacks

    updateBossAttacks();updatePickups();
    if(shots<=0&&reserveAmmo<=0&&playerHP<=0){phase='gameOver';playGameOver()}else boss.outOfAmmoTick=0;
  }

// ===== SHOP CLICK =====
function handleShopClick(mx,my){
  if(my>50&&my<68){for(let i=0;i<4;i++){const tx=W/2-220+i*112;if(mx>tx&&mx<tx+108){shopTab=i;playBuy();return}}}
  if(mx>W/2-80&&mx<W/2+80&&my>H-42&&my<H-14){playRoundStart();if(isBossRound(round)){phase='bossWarn';bossWarnTimer=120;playBossWarn()}else{phase='dogAnim';dogVariant='sniff';dogTimer=80}return}
  if(shopTab===0){
    WEAPONS.forEach((w,i)=>{const col=Math.floor(i/5),row=i%5,cx=15+col*390,cy=78+row*82,owned=ownedWeapons.includes(w.id),eq=equippedWeapon===w.id;if(mx>cx+255&&mx<cx+365&&my>cy+50&&my<cy+70){if(!owned)buyWeapon(w.id);else if(!eq)equipWeapon(w.id)}});
  }else if(shopTab===1){
    ownedWeapons.forEach((id,i)=>{const bx=20+i*92,by=98;if(mx>bx&&mx<bx+86&&my>by&&my<by+30){shopWeaponSel=id;playBuy()}});
    const wid=ownedWeapons.includes(shopWeaponSel)?shopWeaponSel:equippedWeapon;
    ['dmg','ammo','rate'].forEach((stat,si)=>{const y=195+si*48;if(mx>380&&mx<530&&my>y-2&&my<y+22)upgradeWeapon(wid,stat)});
  }else if(shopTab===2){
    SKINS.forEach((s,i)=>{const col=Math.floor(i/5),row=i%5,sx=25+col*385,sy=95+row*72;if(mx>sx+270&&mx<sx+365&&my>sy+18&&my<sy+40){if(!ownedSkins.includes(s.id))buySkin(s.id);else if(equippedSkin!==s.id)equipSkin(s.id)}});
  }else{
    // Ammo tab
    AMMO_PACKS.forEach((p,i)=>{const col=i%2,row=Math.floor(i/2),cx=70+col*360,cy=120+row*70;if(mx>cx+220&&mx<cx+320&&my>cy+18&&my<cy+42)buyAmmoPack(p.id)});
    if(mx>W/2-150&&mx<W/2+150&&my>H-95&&my<H-65)buyFullReload();
  }
}

illStyle='#F5DEB3';ctx.fill();ctx.beginPath();ctx.arc(0,-24,14,0,Math.PI*2);ctx.fillStyle='#A0522D';ctx.fill();ctx.beginPath();ctx.ellipse(-10,-36,5,9,0,0,Math.PI*2);ctx.fillStyle='#6B3410';ctx.fill();ctx.beginPath();ctx.ellipse(10,-36,5,9,0,0,Math.PI*2);ctx.fillStyle='#6B3410';ctx.fill();ctx.beginPath();ctx.arc(-5,-27,2,0,Math.PI*2);ctx.fillStyle='#000';ctx.fill();ctx.beginPath();ctx.arc(5,-27,2,0,Math.PI*2);ctx.fillStyle='#000';ctx.fill();ctx.strokeStyle='#000';ctx.lineWidth=1.5;ctx.beginPath();ctx.moveTo(-4,-20);ctx.quadraticCurveTo(0,-16,4,-20);ctx.stroke();ctx.beginPath();ctx.ellipse(0,-44,12,8,0,0,Math.PI*2);ctx.fillStyle='#4CAF50';ctx.fill();ctx.beginPath();ctx.ellipse(-10,-8,6,5,0,0,Math.PI*2);ctx.fillStyle='#A0522D';ctx.fill();ctx.beginPath();ctx.ellipse(10,-8,6,5,0,0,Math.PI*2);ctx.fillStyle='#A0522D';ctx.fill()}ctx.restore()}
function drawBossWarn(){const f=Math.sin(tick*.2)>0;ctx.fillStyle=f?'rgba(180,0,0,.15)':'rgba(0,0,0,.3)';ctx.fillRect(0,0,W,H);ctx.textAlign='center';ctx.font="26px 'Press Start 2P',monospace";ctx.fillStyle='#F44336';ctx.shadowColor='#F44336';ctx.shadowBlur=20;ctx.fillText('\u26a0 BOSS BATTLE \u26a0',W/2,H/2-20);ctx.shadowBlur=0;ctx.font="11px 'Press Start 2P',monospace";ctx.fillStyle='#FF8A65';ctx.fillText('ROUND '+round,W/2,H/2+15);ctx.font="7px 'Press Start 2P',monospace";ctx.fillStyle='#aaa';ctx.fillText('FIRE \u2022 BOMB \u2022 SPRAY \u2022 ENRAGE!',W/2,H/2+40);ctx.textAlign='left'}
function drawTitle(){ctx.fillStyle='rgba(0,0,0,.5)';ctx.fillRect(0,0,W,H);ctx.textAlign='center';const b=Math.sin(tick*.05)*5;ctx.font="26px 'Press Start 2P',monospace";ctx.shadowColor='#FF6600';ctx.shadowBlur=20;ctx.fillStyle='#FFD700';ctx.fillText('DUCK HUNT',W/2,100+b);ctx.shadowBlur=0;ctx.font="9px 'Press Start 2P',monospace";ctx.fillStyle='#FF8A65';ctx.fillText('GUN MASTER EDITION',W/2,130);ctx.font="6px 'Press Start 2P',monospace";ctx.fillStyle='#aaa';ctx.fillText('10 GUNS \u2022 UPGRADES \u2022 SKINS \u2022 BOSSES',W/2,155);let fx=W/2-90;FACE_KEYS.forEach((k,i)=>{const img=faceImgs[k],wb=Math.sin(tick*.06+i*1.5)*8;if(img&&img.complete){ctx.save();ctx.beginPath();ctx.arc(fx+i*60,210+wb,24,0,Math.PI*2);ctx.clip();ctx.drawImage(img,fx+i*60-24,210+wb-24,48,48);ctx.restore();ctx.beginPath();ctx.arc(fx+i*60,210+wb,25,0,Math.PI*2);ctx.strokeStyle='#FFD700';ctx.lineWidth=2;ctx.stroke()}});ctx.save();drawWeaponPreview(ctx,'diamond',W/2,290,1.6);ctx.restore();if(Math.floor(tick/28)%2===0){ctx.font="12px 'Press Start 2P',monospace";ctx.fillStyle='#fff';ctx.fillText('CLICK TO START',W/2,345)}ctx.textAlign='left'}
function drawGameOver(){ctx.fillStyle='rgba(0,0,0,.78)';ctx.fillRect(0,0,W,H);ctx.textAlign='center';ctx.font="26px 'Press Start 2P',monospace";ctx.shadowColor='#F44336';ctx.shadowBlur=15;ctx.fillStyle='#F44336';ctx.fillText('GAME OVER',W/2,130);ctx.shadowBlur=0;if(playerHP<=0){ctx.font="8px 'Press Start 2P',monospace";ctx.fillStyle='#FF8A65';ctx.fillText('DEFEATED BY THE BOSS!',W/2,160)}ctx.font="12px 'Press Start 2P',monospace";ctx.fillStyle='#FFD700';ctx.fillText('SCORE: '+String(score).padStart(7,'0'),W/2,200);ctx.font="9px 'Press Start 2P',monospace";ctx.fillStyle='#aaa';ctx.fillText('ROUND '+round+' | COINS '+coins,W/2,230);if(Math.floor(tick/28)%2===0){ctx.font="11px 'Press Start 2P',monospace";ctx.fillStyle='#fff';ctx.fillText('CLICK TO RESTART',W/2,300)}ctx.textAlign='left'}

// ===== MAIN DRAW =====
function draw(){
  ctx.clearRect(0,0,W,H);ctx.save();ctx.translate(screenShake.x,screenShake.y);
  drawSky();drawSun();drawMountains();drawClouds();drawBgBirds();drawTrees();
  if(phase==='playing')ducks.forEach(d=>{if(!d.gone)drawTarget(d)});
  if(phase==='boss'&&boss){boss.minions.forEach(m=>{if(!m.gone)drawTarget(m)});drawBoss();drawBossAttacks();drawPickups()}
  drawGround();drawWeaponParticles();drawEffects();
  if(phase==='dogAnim'&&dogVariant){drawDog(400,GROUND_Y+22,dogVariant);ctx.textAlign='center';ctx.font="14px 'Press Start 2P',monospace";if(dogVariant==='laugh'){ctx.fillStyle='#FF5722';ctx.fillText('HA HA HA!',W/2,190)}else if(dogVariant==='hold'){ctx.fillStyle='#4CAF50';ctx.fillText('NICE SHOT!',W/2,180);ctx.font="8px 'Press Start 2P',monospace";ctx.fillStyle='#FFD700';ctx.fillText('+'+Math.floor(50+round*20)+' COINS',W/2,205)}else{ctx.fillStyle='#FFD700';ctx.fillText('ROUND '+round,W/2,180)}ctx.textAlign='left'}
  drawMuzzleFlash();
  if(phase==='playing'||phase==='boss')drawEquippedWeapon();
  if(phase==='playing'||phase==='boss'){drawCrosshair(mouseX,mouseY);canvas.style.cursor='none'}else canvas.style.cursor='pointer';
  ctx.restore();
  if(phase==='playing'||phase==='boss'||phase==='dogAnim')drawHUD();
  if(phase==='playing'||phase==='boss'){drawReloadButton();drawAmmoMsg()}
  if(phase==='boss')drawEmergencyButton();
  if(phase==='boss'){drawBossHP();drawPlayerHP();drawSkillButtons();if(boss&&boss.alive&&boss.enraged&&Math.floor(tick/15)%2===0){ctx.textAlign='center';ctx.font="12px 'Press Start 2P',monospace";ctx.fillStyle='#FF1744';ctx.shadowColor='#FF1744';ctx.shadowBlur=12;ctx.fillText('\u26a0 BOSS ENRAGED \u26a0',W/2,95);ctx.shadowBlur=0;ctx.textAlign='left'}}
  if(phase==='title')drawTitle();
  if(phase==='gameOver')drawGameOver();
  if(phase==='shop')drawShop();
  if(phase==='bossWarn')drawBossWarn();
}

function drawReloadButton(){
  if(phase!=='playing'&&phase!=='boss')return;
  // bottom-right reload button (above HUD), mobile-friendly
  const bw=86,bh=30,bx=W-bw-12,by=H-145;
  const can=canReload();
  ctx.fillStyle=isReloading?'rgba(255,213,79,.25)':can?'rgba(76,175,80,.25)':'rgba(0,0,0,.35)';
  ctx.fillRect(bx,by,bw,bh);ctx.strokeStyle=can?'#4CAF50':'#555';ctx.lineWidth=1.5;ctx.strokeRect(bx,by,bw,bh);
  ctx.font="7px 'Press Start 2P',monospace";ctx.fillStyle=can?'#FFF':'#777';ctx.textAlign='center';
  ctx.fillText(isReloading?'...':'↻ RELOAD',bx+bw/2,by+13);
  ctx.font="5px 'Press Start 2P',monospace";ctx.fillStyle='#90CAF9';ctx.fillText('[R] '+reserveAmmo,bx+bw/2,by+23);ctx.textAlign='left';
  // store rect for click test
  drawReloadButton.rect={x:bx,y:by,w:bw,h:bh};
}
function drawEmergencyButton(){
  if(phase!=='boss')return;
  const bw=86,bh=30,bx=W-bw-12,by=H-110;
  const can=emergencyUses<2&&emergencyCd<=0&&coins>=500;
  ctx.fillStyle=can?'rgba(255,152,0,.25)':'rgba(0,0,0,.35)';ctx.fillRect(bx,by,bw,bh);
  ctx.strokeStyle=can?'#FF9800':'#555';ctx.lineWidth=1.5;ctx.strokeRect(bx,by,bw,bh);
  if(emergencyCd>0){ctx.fillStyle='rgba(0,0,0,.5)';ctx.fillRect(bx,by,bw*(emergencyCd/600),bh)}
  ctx.font="6px 'Press Start 2P',monospace";ctx.fillStyle=can?'#FFF':'#777';ctx.textAlign='center';
  ctx.fillText('⚡AMMO DROP',bx+bw/2,by+12);
  ctx.font="5px 'Press Start 2P',monospace";ctx.fillStyle='#FFD700';ctx.fillText('[E] 🪙500 ('+(2-emergencyUses)+')',bx+bw/2,by+23);ctx.textAlign='left';
  drawEmergencyButton.rect={x:bx,y:by,w:bw,h:bh};
}
function drawAmmoMsg(){
  if(ammoMsgTimer<=0)return;
  ctx.globalAlpha=Math.min(1,ammoMsgTimer/30);
  ctx.font="9px 'Press Start 2P',monospace";ctx.fillStyle='#FFEB3B';ctx.textAlign='center';
  ctx.shadowColor='#000';ctx.shadowBlur=4;ctx.fillText(ammoMsg,W/2,H-160);ctx.shadowBlur=0;ctx.textAlign='left';ctx.globalAlpha=1;
}

function gameLoop(){update();draw();requestAnimationFrame(gameLoop)}

// ===== INPUT =====
function getPos(e){const r=canvas.getBoundingClientRect();return{x:(e.clientX-r.left)*(W/r.width),y:(e.clientY-r.top)*(H/r.height)}}
canvas.addEventListener('mousemove',e=>{const p=getPos(e);mouseX=p.x;mouseY=p.y});
canvas.addEventListener('mousedown',e=>{const p=getPos(e);mouseX=p.x;mouseY=p.y;mouseDown=true;shootWithWeapon(p.x,p.y)});
canvas.addEventListener('mouseup',()=>{mouseDown=false});
canvas.addEventListener('mouseleave',()=>{mouseDown=false});
canvas.addEventListener('touchstart',e=>{e.preventDefault();const t=e.touches[0];if(!t)return;const r=canvas.getBoundingClientRect();const px=(t.clientX-r.left)*(W/r.width),py=(t.clientY-r.top)*(H/r.height);mouseX=px;mouseY=py;mouseDown=true;shootWithWeapon(px,py)},{passive:false});
canvas.addEventListener('touchmove',e=>{e.preventDefault();const t=e.touches[0];if(!t)return;const r=canvas.getBoundingClientRect();mouseX=(t.clientX-r.left)*(W/r.width);mouseY=(t.clientY-r.top)*(H/r.height)},{passive:false});
canvas.addEventListener('touchend',e=>{e.preventDefault();mouseDown=false},{passive:false});
document.addEventListener('keydown',e=>{const k=e.key.toLowerCase();if(k==='1')useSkill(0);else if(k==='2')useSkill(1);else if(k==='3')useSkill(2);else if(k==='r')reloadWeapon();else if(k==='e')useEmergencyAmmoDrop()});
gameLoop();
</script></body></html>
