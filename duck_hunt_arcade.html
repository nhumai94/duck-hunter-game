let audioCtx=null,soundOn=true;
function initAudio(){if(!audioCtx)audioCtx=new(window.AudioContext||window.webkitAudioContext)()}
function toggleSound(){soundOn=!soundOn;document.getElementById('soundBtn').textContent=soundOn?'🔊 ON':'🔇 OFF'}
function snd(type,freq,dur,vol,wave){
  if(!soundOn||!audioCtx)return;
  const o=audioCtx.createOscillator();o.type=wave||'sine';o.frequency.setValueAtTime(freq,audioCtx.currentTime);
  if(type==='down')o.frequency.exponentialRampToValueAtTime(Math.max(20,freq*0.3),audioCtx.currentTime+dur);
  if(type==='up')o.frequency.exponentialRampToValueAtTime(freq*3,audioCtx.currentTime+dur);
  const g=audioCtx.createGain();g.gain.setValueAtTime(vol||0.15,audioCtx.currentTime);
  g.gain.exponentialRampToValueAtTime(0.001,audioCtx.currentTime+dur);
  o.connect(g);g.connect(audioCtx.destination);o.start();o.stop(audioCtx.currentTime+dur);
}
function playShot(){if(!soundOn||!audioCtx)return;const dur=0.18,buf=audioCtx.createBuffer(1,audioCtx.sampleRate*dur,audioCtx.sampleRate),d=buf.getChannelData(0);for(let i=0;i<d.length;i++)d[i]=(Math.random()*2-1)*Math.exp(-i/(d.length*0.12));const src=audioCtx.createBufferSource();src.buffer=buf;const filt=audioCtx.createBiquadFilter();filt.type='lowpass';filt.frequency.value=900;const g=audioCtx.createGain();g.gain.setValueAtTime(0.7,audioCtx.currentTime);g.gain.exponentialRampToValueAtTime(0.01,audioCtx.currentTime+dur);src.connect(filt);filt.connect(g);g.connect(audioCtx.destination);src.start();src.stop(audioCtx.currentTime+dur);snd('down',160,0.14,0.5)}
function playShotgun(){if(!soundOn||!audioCtx)return;playShot();setTimeout(()=>snd('down',100,0.2,0.4),30)}
function playLaser(){snd('down',1800,0.3,0.2,'sawtooth');snd('down',2400,0.2,0.1)}
function playHit(){snd('up',880,0.3,0.3);snd('',1320,0.2,0.15)}

];
let playerWeapons=['pistol'],currentWeaponIdx=0,weaponUpgrades={},coins=0;

function initWeapons(){playerWeapons=['pistol'];currentWeaponIdx=0;weaponUpgrades={pistol:{dmg:0,ammo:0,rate:0}};coins=0}
function getCurrentWeapon(){
  const id=playerWeapons[currentWeaponIdx];const base=WEAPONS.find(w=>w.id===id);
  const up=weaponUpgrades[id]||{dmg:0,ammo:0,rate:0};
  return{...base,dmg:base.dmg+up.dmg,ammo:base.ammo+up.ammo*2,upgradeLevel:up.dmg+up.ammo+up.rate,ups:up};
}
function getUpgradeCost(wid,stat){const up=weaponUpgrades[wid]||{dmg:0,ammo:0,rate:0};return Math.floor(150*(1+(up[stat]||0)*0.8))}
function buyWeapon(id){const w=WEAPONS.find(x=>x.id===id);if(!w||playerWeapons.includes(id)||coins<w.price)return false;coins-=w.price;playerWeapons.push(id);weaponUpgrades[id]={dmg:0,ammo:0,rate:0};currentWeaponIdx=playerWeapons.indexOf(id);playBuy();return true}
function upgradeWeapon(wid,stat){const up=weaponUpgrades[wid];if(!up||up[stat]>=5)return false;const cost=getUpgradeCost(wid,stat);if(coins<cost)return false;coins-=cost;up[stat]++;playUpgrade();return true}

function getDuckSpeed(r){return 1.4+r*0.3}
function getDuckCount(r){return r<=3?8+r:r<=6?10+r:Math.min(12+r*2,30)}
function getDuckSize(r){return Math.max(22,30-r*0.5)}
function getFleeTime(r){return Math.max(3500,7500-r*350)}
function getSpawnInterval(r){return Math.max(30,80-r*4)}
function getRequiredHitRate(r){return Math.min(0.8,0.5+r*0.02)}
function isBossRound(r){return r>=3&&r%3===0}
function getDuckPattern(r,id){
  if(r<=3)return'normal';
  const p=['normal','normal','zigzag','dive'];
  if(r>=7)p.push('zigzag','spiral');
  if(r>=10)p.push('teleport');
  return p[(id+r)%p.length];
}

const clouds=[];for(let i=0;i<6;i++)clouds.push({x:Math.random()*W,y:25+Math.random()*80,s:.5+Math.random()*.6,sp:.06+Math.random()*.12});
const bgBirds=[];for(let i=0;i<5;i++)bgBirds.push({x:Math.random()*W,y:30+Math.random()*60,sp:.2+Math.random()*.35});

// ===== FACTORIES =====
function makeDuck(rd){
  const id=duckId++,fl=Math.random()>.5,spd=getDuckSpeed(rd)+Math.random()*1.2,sz=getDuckSize(rd);
  return{id,faceKey:FACE_KEYS[id%4],x:fl?-45:W+45,y:55+Math.random()*210,vx:(fl?1:-1)*spd,vy:-.3-Math.random()*.8,dir:fl?1:-1,alive:true,falling:false,gone:false,fallV:0,born:Date.now(),nextTurn:40+Math.random()*80,rot:0,rotSpeed:0,wobble:Math.random()*Math.PI*2,trail:[],pattern:getDuckPattern(rd,id),patTick:0,sz:sz,hp:1};
}
function makeBoss(rd){
  const hp=100+rd*40;
  return{x:W/2,y:150,vx:2+rd*0.2,vy:0,hp:hp,maxHp:hp,phase:0,phaseTick:0,alive:true,sz:55,summonTimer:300,flashTimer:0,minions:[],attackCd:180,outOfAmmoTick:0};
}
function makeBossMinion(){
  const id=duckId++,fl=Math.random()>.5;
  return{id,faceKey:FACE_KEYS[id%4],x:fl?-30:W+30,y:60+Math.random()*150,vx:(fl?1:-1)*(2+Math.random()*2),vy:-.5+Math.random(),dir:fl?1:-1,alive:true,falling:false,gone:false,fallV:0,born:Date.now(),nextTurn:30+Math.random()*50,rot:0,rotSpeed:0,wobble:Math.random()*Math.PI*2,trail:[],pattern:'zigzag',patTick:0,sz:22,hp:1};
}

// ===== EFFECTS =====
function addP(x,y,n,cols){const c=cols||['#FFD700','#FF6600','#FF4444','#FFF','#FF69B4','#00FF88'];for(let i=0;i<n;i++){const a=Math.random()*Math.PI*2,s=1+Math.random()*7;particles.push({x,y,vx:Math.cos(a)*s,vy:Math.sin(a)*s-2,life:25+Math.random()*30,maxLife:55,size:1.5+Math.random()*5,color:c[Math.floor(Math.random()*c.length)],type:Math.random()>.5?'circle':'star'})}}
function addShock(x,y,r,c){shockwaves.push({x,y,r:5,maxR:r||80,color:c||'rgba(255,215,0,0.6)',life:1})}
function shake(n){screenShake.t=8;screenShake.intensity=n||6}
function addStarBurst(x,y){for(let i=0;i<8;i++){const a=i*Math.PI/4;particles.push({x,y,vx:Math.cos(a)*4,vy:Math.sin(a)*4,life:20,maxLife:20,size:3,color:'#FFD700',type:'star'})}}
function addFloat(x,y,text,color,shadow){floats.push({x,y,text,startTick:tick,color:color||'#FFD700',shadow:shadow||'#FF6600'})}

// ===== PLAYER HP =====
function initPlayerHP(){playerHP=playerMaxHP;playerHitFlash=0}
function damagePlayer(amt){
  playerHP=Math.max(0,playerHP-amt);playerHitFlash=30;shake(8);playPlayerHit();
  addFloat(mouseX,mouseY-30,'-'+amt+' HP','#FF0000','#880000');
  if(playerHP<=0){phase='gameOver';playGameOver()}
}


// ===== PICKUP SYSTEM (boss rounds) =====
function spawnPickup(x,y){
  const isHealth=Math.random()>0.5;
  pickups.push({
    x,y,vy:1.2,type:isHealth?'health':'ammo',
    life:360,wobble:Math.random()*Math.PI*2,collected:false
  });
}
function updatePickups(){
  pickups=pickups.filter(p=>{
    p.life--;if(p.life<=0)return false;
    p.wobble+=0.08;
    p.y+=p.vy;if(p.y>GROUND_Y-30){p.y=GROUND_Y-30;p.vy=0}
    // Auto-collect if crosshair hovers over it (player "grabs" by aiming)
    if(Math.hypot(mouseX-p.x,mouseY-p.y)<28){
      if(p.type==='health'){playerHP=Math.min(playerMaxHP,playerHP+25);addFloat(p.x,p.y-20,'+25 HP','#4CAF50','#2E7D32')}
      else{shots=Math.min(maxShots,shots+5);addFloat(p.x,p.y-20,'+5 AMMO','#FF9800','#E65100')}
      addP(p.x,p.y,12,p.type==='health'?['#4CAF50','#81C784','#FFF']:['#FF9800','#FFB74D','#FFF']);
      playBuy();return false;
    }
    return true;
  });
}
function drawPickups(){
  pickups.forEach(p=>{
    const bob=Math.sin(p.wobble)*4;
    const blink=p.life<90&&Math.floor(p.life/6)%2===0; // blink before expiring
    if(blink)return;
    ctx.save();ctx.translate(p.x,p.y+bob);
    // glow
    ctx.globalAlpha=0.3;ctx.beginPath();ctx.arc(0,0,20,0,Math.PI*2);
    ctx.fillStyle=p.type==='health'?'#4CAF50':'#FF9800';ctx.fill();ctx.globalAlpha=1;
    // capsule
    ctx.beginPath();ctx.arc(0,0,13,0,Math.PI*2);
    ctx.fillStyle=p.type==='health'?'#2E7D32':'#E65100';ctx.fill();
    ctx.strokeStyle='#FFF';ctx.lineWidth=2;ctx.stroke();
    // icon
    ctx.fillStyle='#FFF';ctx.font="12px 'Press Start 2P',monospace";ctx.textAlign='center';
    ctx.fillText(p.type==='health'?'+':'◉',0,4);ctx.textAlign='left';
    ctx.restore();
  });
}

// ===== BOSS ATTACKS =====
function bossFireBreath(){
  if(!boss||!boss.alive)return;
  const ang=Math.atan2(mouseY-boss.y,mouseX-boss.x);
  bossAttacks.push({
    type:'fire',x:boss.x,y:boss.y,angle:ang,
    warnTime:48,activeTime:90,life:138,// ~0.8s warn + 1.5s active
    dmg:15+Math.floor(round/5)*5,
    width:60+Math.floor(round/5)*5,
    length:250+round*5
  });
  playBossAttack();
}

function bossThrowBomb(){
  if(!boss||!boss.alive)return;
  const tx=mouseX+(Math.random()-.5)*60,ty=mouseY+(Math.random()-.5)*60;
  bossAttacks.push({
    type:'bomb',tx:Math.max(40,Math.min(W-40,tx)),ty:Math.max(40,Math.min(GROUND_Y-20,ty)),
    warnTime:60,explodeTime:20,life:80,// 1s warn + 0.33s explode
    dmg:25+Math.floor(round/5)*8,
    radius:55+Math.floor(round/5)*3,
    exploding:false
  });
  playBossAttack();
}

function bossSpray(){
  // NEW: third attack - radial projectile burst the player must dodge
  if(!boss||!boss.alive)return;
  const n=8+Math.floor(round/3); // more bullets at higher rounds
  for(let i=0;i<n;i++){
    const ang=(i/n)*Math.PI*2+Math.random()*0.2;
    const spd=2.2+round*0.08;
    bossAttacks.push({
      type:'spray',x:boss.x,y:boss.y,
      vx:Math.cos(ang)*spd,vy:Math.sin(ang)*spd,
      r:9,life:240,warnTime:0,
      dmg:10+Math.floor(round/5)*4
    });
  }
  playBossAttack();
}

function updateBossAttacks(){
  const spdMult=freezeActive>0?0.3:1;
  bossAttacks=bossAttacks.filter(a=>{
    a.life-=spdMult;
    if(a.life<=0)return false;
    if(a.type==='spray'){
      // Moving projectile - travels outward, damages player on contact
      a.x+=a.vx*spdMult;a.y+=a.vy*spdMult;
      if(a.x<0||a.x>W||a.y<0||a.y>GROUND_Y)return false;
      // trail particles
      if(tick%2===0)addP(a.x,a.y,1,['#FF6600','#FFA500']);
      if(Math.hypot(mouseX-a.x,mouseY-a.y)<a.r+10){damagePlayer(a.dmg);return false}
      return true;
    }
    if(a.type==='fire'){
      a.warnTime-=spdMult;
      if(a.warnTime<=0){
        a.activeTime-=spdMult;
        // Check player hit
        if(a.activeTime>0&&a.activeTime<85){
          const dx=mouseX-a.x,dy=mouseY-a.y;
          const dist=Math.hypot(dx,dy);
          const ang=Math.atan2(dy,dx);
          const angleDiff=Math.abs(ang-a.angle);
          const normDiff=angleDiff>Math.PI?2*Math.PI-angleDiff:angleDiff;
          if(dist<a.length&&normDiff<0.35&&tick%15===0){
            damagePlayer(Math.ceil(a.dmg/6));
          }
        }
      }
    }
    if(a.type==='bomb'){
      a.warnTime-=spdMult;
      if(a.warnTime<=0&&!a.exploding){
        a.exploding=true;
        playExplosion();addP(a.tx,a.ty,25,['#FF4400','#FF6600','#FFD700','#FFF']);
        addShock(a.tx,a.ty,a.radius+20,'rgba(255,100,0,0.6)');shake(6);
        // Check player hit
        if(Math.hypot(mouseX-a.tx,mouseY-a.ty)<a.radius){
          damagePlayer(a.dmg);
        }
      }
    }
    return true;
  });
}

function drawBossAttacks(){
  bossAttacks.forEach(a=>{
    if(a.type==='spray'){
      // glowing red-orange energy ball
      ctx.globalAlpha=.4;ctx.beginPath();ctx.arc(a.x,a.y,a.r+5,0,Math.PI*2);ctx.fillStyle='#FF6600';ctx.fill();
      ctx.globalAlpha=1;ctx.beginPath();ctx.arc(a.x,a.y,a.r,0,Math.PI*2);ctx.fillStyle='#FF3300';ctx.fill();
      ctx.beginPath();ctx.arc(a.x,a.y,a.r*0.5,0,Math.PI*2);ctx.fillStyle='#FFEB3B';ctx.fill();
      return;
    }
    if(a.type==='fire'){
      if(a.warnTime>0){
        // Warning line
        ctx.save();ctx.translate(a.x,a.y);ctx.rotate(a.angle);
        ctx.globalAlpha=0.3+Math.sin(tick*0.3)*0.15;
        ctx.fillStyle='#FF4400';
        ctx.beginPath();ctx.moveTo(0,-8);ctx.lineTo(a.length,-a.width/2);ctx.lineTo(a.length,a.width/2);ctx.lineTo(0,8);ctx.closePath();ctx.fill();
        ctx.globalAlpha=1;ctx.restore();
        // "!" warning
        ctx.font="bold 20px 'Press Start 2P',monospace";ctx.fillStyle='#FF0000';ctx.textAlign='center';
        ctx.fillText('⚠',a.x,a.y-a.sz-15||a.y-70);ctx.textAlign='left';
      }else if(a.activeTime>0){
        // Active fire
        ctx.save();ctx.translate(a.x,a.y);ctx.rotate(a.angle);
        const grad=ctx.createLinearGradient(0,0,a.length,0);
        grad.addColorStop(0,'rgba(255,200,0,0.9)');grad.addColorStop(0.3,'rgba(255,100,0,0.7)');
        grad.addColorStop(0.7,'rgba(255,50,0,0.4)');grad.addColorStop(1,'rgba(255,0,0,0)');
        ctx.fillStyle=grad;
        const w=a.width*(0.5+Math.random()*0.5);
        ctx.beginPath();ctx.moveTo(0,-6);ctx.lineTo(a.length*0.3,-w/2);ctx.lineTo(a.length,-w/3);
        ctx.lineTo(a.length,w/3);ctx.lineTo(a.length*0.3,w/2);ctx.lineTo(0,6);ctx.closePath();ctx.fill();
        // Fire particles
        for(let i=0;i<3;i++){
          const fx=Math.random()*a.length,fy=(Math.random()-.5)*w*0.7;
          ctx.beginPath();ctx.arc(fx,fy,2+Math.random()*4,0,Math.PI*2);
          ctx.fillStyle=['#FF0','#F80','#F40','#FFF'][Math.floor(Math.random()*4)];ctx.fill();
        }
        ctx.restore();
      }
    }
    if(a.type==='bomb'){
      if(a.warnTime>0){
        // Warning circle
        const p=1-a.warnTime/60;
        ctx.globalAlpha=0.2+p*0.3;ctx.strokeStyle='#FF0000';ctx.lineWidth=2+p*2;
        ctx.beginPath();ctx.arc(a.tx,a.ty,a.radius*p,0,Math.PI*2);ctx.stroke();
        ctx.setLineDash([5,5]);ctx.beginPath();ctx.arc(a.tx,a.ty,a.radius,0,Math.PI*2);ctx.stroke();ctx.setLineDash([]);
        ctx.globalAlpha=0.15+p*0.2;ctx.fillStyle='#FF0000';
        ctx.beginPath();ctx.arc(a.tx,a.ty,a.radius*p,0,Math.PI*2);ctx.fill();
        ctx.globalAlpha=1;
        // Bomb icon
        ctx.font="14px 'Press Start 2P',monospace";ctx.textAlign='center';ctx.fillStyle='#FFF';
        ctx.fillText('💣',a.tx,a.ty+5);ctx.textAlign='left';
      }else if(a.exploding){
        // Explosion
        const p=1-a.life/20;
        ctx.globalAlpha=Math.max(0,1-p);
        ctx.beginPath();ctx.arc(a.tx,a.ty,a.radius*(.5+p*.5),0,Math.PI*2);
        const eg=ctx.createRadialGradient(a.tx,a.ty,0,a.tx,a.ty,a.radius);
        eg.addColorStop(0,'#FFF');eg.addColorStop(0.3,'#FFD700');eg.addColorStop(0.6,'#FF6600');eg.addColorStop(1,'rgba(255,0,0,0)');
        ctx.fillStyle=eg;ctx.fill();ctx.globalAlpha=1;
      }
    }
  });
}

// ===== GAME FLOW =====
function startGame(){initAudio();initWeapons();initSkins();score=0;round=1;duckId=0;combo=0;bestCombo=0;phase='dogAnim';dogVariant='sniff';dogTimer=90;playRoundStart()}
function beginRound(){
  const w=getCurrentWeapon();ducks=[];kills=0;escaped=0;spawnCount=0;spawnTimer=0;roundEndChecked=false;
  maxShots=w.ammo;shots=maxShots;floats=[];particles=[];shockwaves=[];combo=0;phase='playing';
}
function startBossRound(){
  const w=getCurrentWeapon();boss=makeBoss(round);ducks=[];kills=0;escaped=0;
  floats=[];particles=[];shockwaves=[];bossAttacks=[];pickups=[];
  bossAmmo=20+w.ammo*3;shots=bossAmmo;maxShots=bossAmmo;
  skills.forEach(s=>{s.cooldown=0;s.uses=s.maxUses;s.active=0});
  rapidFireActive=0;freezeActive=0;initPlayerHP();phase='boss';
}
function openShop(){phase='shop';shopTab=0}
function bossDeath(){
  boss.alive=false;bossAttacks=[];
  addP(boss.x,boss.y,60,['#FFD700','#FF6600','#FF4444','#FFF','#FF69B4']);
  addShock(boss.x,boss.y,150,'rgba(255,215,0,0.7)');addStarBurst(boss.x,boss.y);shake(15);
  const bonus=200+round*50;coins+=bonus;score+=bonus*10;
  addFloat(boss.x,boss.y-30,'BOSS DEFEATED!','#FFD700','#FF6600');
  addFloat(boss.x,boss.y+10,'+'+bonus+' COINS','#00FF88','#008844');
  playBossDie();setTimeout(()=>{round++;openShop()},2000);
}
function useSkill(idx){
  if(phase!=='boss'||!boss||!boss.alive)return;
  const s=skills[idx];if(s.cooldown>0||s.uses<=0)return;
  s.uses--;s.cooldown=s.maxCd;playSkill();
  if(idx===0){rapidFireActive=s.dur;addFloat(W/2,200,'RAPID FIRE!','#FF6600','#FF0000')}
  else if(idx===1){const dmg=Math.floor(boss.maxHp*.15);boss.hp=Math.max(0,boss.hp-dmg);boss.flashTimer=15;addP(boss.x,boss.y,40,['#FF0000','#FF6600','#FFD700']);addShock(boss.x,boss.y,120,'rgba(255,0,0,0.6)');shake(12);addFloat(boss.x,boss.y-40,'-'+dmg+' BOMB!','#FF4444','#FF0000');if(boss.hp<=0)bossDeath()}
  else if(idx===2){freezeActive=s.dur;addFloat(W/2,200,'FREEZE!','#00BFFF','#0066FF');addP(boss.x,boss.y,20,['#00BFFF','#87CEEB','#FFF'])}
}

// ===== UPDATE =====
function update(){
  tick++;
  particles=particles.filter(p=>{p.x+=p.vx;p.y+=p.vy;p.vy+=0.12;p.vx*=0.98;p.life--;return p.life>0});
  floats=floats.filter(f=>tick-f.startTick<50);
  shockwaves=shockwaves.filter(s=>{s.r+=(s.maxR-s.r)*0.15;s.life-=0.035;return s.life>0});
  gunRecoil*=0.8;gunAngle*=0.85;
  if(playerHitFlash>0)playerHitFlash--;
  if(coinComboTimer>0){coinComboTimer--;if(coinComboTimer<=0)coinComboMult=1}
  if(screenShake.t>0){screenShake.t--;screenShake.x=(Math.random()-.5)*screenShake.intensity;screenShake.y=(Math.random()-.5)*screenShake.intensity}else{screenShake.x=0;screenShake.y=0}

  if(phase==='bossWarn'){bossWarnTimer--;if(bossWarnTimer<=0)startBossRound();return}

  if(phase==='dogAnim'){
    dogTimer--;
    if(dogTimer<=0){
      if(dogVariant==='sniff'){if(isBossRound(round)){phase='bossWarn';bossWarnTimer=120;playBossWarn()}else beginRound()}
      else if(dogVariant==='hold'){round++;openShop()}
      else{phase='gameOver';playGameOver()}
    }
  }

  // ===== NORMAL ROUND =====
  if(phase==='playing'){
    const total=getDuckCount(round),interval=getSpawnInterval(round);
    spawnTimer++;
    if(spawnTimer>=interval&&spawnCount<total){ducks.push(makeDuck(round));spawnCount++;const w=getCurrentWeapon();maxShots=w.ammo;shots=maxShots;spawnTimer=0}
    const fleeTime=getFleeTime(round);
    ducks.forEach(d=>{
      if(d.gone)return;
      if(d.falling){d.fallV+=.45;d.y+=d.fallV;d.rotSpeed=d.dir*.1;if(d.y>GROUND_Y+90)d.gone=true;return}
      if(!d.alive)return;d.patTick++;
      if(d.pattern==='zigzag')d.vy=Math.sin(d.patTick*.08)*3;
      else if(d.pattern==='dive'){d.vy=d.patTick%200<100?2:-2}
      else if(d.pattern==='spiral'){d.vx=Math.cos(d.patTick*.04)*getDuckSpeed(round)*1.2;d.vy=Math.sin(d.patTick*.04)*getDuckSpeed(round)*.8}
      else if(d.pattern==='teleport'&&d.patTick%120===0){d.x=50+Math.random()*(W-100);d.y=50+Math.random()*200;addP(d.x,d.y,5,['#FFF','#87CEEB'])}
      d.x+=d.vx;d.y+=d.vy;d.nextTurn--;
      if(d.x<35){d.x=35;d.vx=Math.abs(d.vx);d.dir=1}if(d.x>W-35){d.x=W-35;d.vx=-Math.abs(d.vx);d.dir=-1}
      if(d.y<40){d.y=40;d.vy=Math.abs(d.vy)*.5}if(d.y>GROUND_Y-70){d.y=GROUND_Y-70;d.vy=-Math.abs(d.vy)}
      if(d.nextTurn<=0&&d.pattern==='normal'){d.vy=-1.5+Math.random()*3;const sp=getDuckSpeed(round)*.7+Math.random()*getDuckSpeed(round)*.6;d.vx=(Math.random()>.5?1:-1)*sp;d.dir=d.vx>0?1:-1;d.nextTurn=Math.max(20,50-round*2)+Math.random()*50}
      if(Date.now()-d.born>fleeTime){d.y-=2.5+round*.3;if(d.y<-60){d.gone=true;escaped++;combo=0;playFlyAway()}}
      if(!d.falling&&d.alive&&tick%3===0)d.trail.push({x:d.x,y:d.y});if(d.trail.length>8)d.trail.shift();
    });
    if(!roundEndChecked&&kills+escaped>=total&&ducks.every(d=>d.gone)){
      roundEndChecked=true;const rate=kills/total;
      setTimeout(()=>{const success=rate>=getRequiredHitRate(round);phase='dogAnim';dogVariant=success?'hold':'laugh';dogTimer=120;if(success){const bonus=Math.floor(50+round*20);coins+=bonus;addFloat(W/2,200,'+'+bonus+' COINS','#FFD700')}if(!success)playLaugh();else playRoundStart()},600);
    }
  }

  // ===== BOSS UPDATE =====
  if(phase==='boss'&&boss&&boss.alive){
    if(rapidFireActive>0){rapidFireActive--;if(tick%10===0&&shots<maxShots)shots=Math.min(maxShots,shots+2)}
    if(freezeActive>0)freezeActive--;
    skills.forEach(s=>{if(s.cooldown>0)s.cooldown--});

    const spd=freezeActive>0?0.3:1;boss.phaseTick++;
    if(boss.flashTimer>0)boss.flashTimer--;

    const hpPct=boss.hp/boss.maxHp;
    if(hpPct>0.6){boss.x+=boss.vx*spd;if(boss.x<80||boss.x>W-80)boss.vx*=-1;boss.y=150+Math.sin(boss.phaseTick*.02)*30}
    else if(hpPct>0.3){boss.x=W/2+Math.sin(boss.phaseTick*.025*spd)*250;boss.y=160+Math.sin(boss.phaseTick*.05*spd)*80}
    else{boss.x+=Math.sin(boss.phaseTick*.06*spd)*4;boss.y+=Math.cos(boss.phaseTick*.04*spd)*3;boss.x=Math.max(80,Math.min(W-80,boss.x));boss.y=Math.max(60,Math.min(280,boss.y));if(boss.phaseTick%60===0)boss.x+=(boss.x>mouseX?1:-1)*40}

    // Summon minions
    boss.summonTimer-=spd;
    if(boss.summonTimer<=0&&boss.minions.length<4){boss.minions.push(makeBossMinion());boss.summonTimer=Math.max(150,400-round*20)}
    boss.minions.forEach(m=>{if(m.gone)return;if(m.falling){m.fallV+=.45;m.y+=m.fallV;if(m.y>GROUND_Y+90)m.gone=true;return}if(!m.alive)return;m.patTick++;m.vy=Math.sin(m.patTick*.1)*2;m.x+=m.vx*(freezeActive>0?.3:1);m.y+=m.vy;if(m.x<20||m.x>W-20)m.vx*=-1;if(m.y<30)m.vy=1;if(m.y>GROUND_Y-80)m.vy=-1});
    boss.minions=boss.minions.filter(m=>!m.gone);

    // Boss attacks! ENRAGE when HP < 30% -> attacks much faster
    const enraged = boss.hp/boss.maxHp < 0.3;
    boss.enraged = enraged;
    boss.attackCd-=spd*(enraged?1.8:1); // enrage speeds up the attack timer
    if(boss.attackCd<=0){
      let atkInterval=Math.max(80,220-round*8);
      if(enraged)atkInterval=Math.floor(atkInterval*0.55); // much faster when enraged
      boss.attackCd=atkInterval;
      // Pick one of THREE attacks (spray unlocks the variety)
      const roll=Math.random();
      if(roll<0.4)bossFireBreath();
      else if(roll<0.75)bossThrowBomb();
      else bossSpray();
      // High rounds OR enraged: combo a second attack

// ===== SHOOTING =====
function handleShoot(px,py){
  initAudio();
  if(phase==='title'||phase==='gameOver'){startGame();return}
  if(phase==='shop'){handleShopClick(px,py);return}
  // Check skill buttons in boss round
  if(phase==='boss'){const sy=H-145;for(let i=0;i<3;i++){if(px>15+i*90&&px<95+i*90&&py>sy&&py<sy+30){useSkill(i);return}}}
  if(phase!=='playing'&&phase!=='boss')return;
  if(shots<=0)return;

  const w=getCurrentWeapon();shots--;flashX=px;flashY=py;flashTimer=5;gunRecoil=-8;gunAngle=-.06;
  if(w.id==='shotgun')playShotgun();else if(w.id==='laser'||w.id==='golden')playLaser();else playShot();
  shake(w.id==='shotgun'?5:3);addP(px,py,4,['#FFD700','#FF6600']);

  // Skin trail effect
  const skin=getSkin();
  if(skin.trail)addP(px,py,3,[skin.trail,skin.glow||'#FFF']);

  const hitPts=[{x:px,y:py}];
  if(w.spread>0)for(let i=0;i<w.spread;i++){hitPts.push({x:px+(Math.random()-.5)*80,y:py+(Math.random()-.5)*80});addP(px+(Math.random()-.5)*100,py+(Math.random()-.5)*100,2,['#FFA'])}

  if(phase==='playing'){
    let hitAny=false;
    for(const hp of hitPts){for(let d of ducks){if(!d.alive||d.falling||d.gone)continue;if(Math.hypot(d.x-hp.x,d.y-hp.y)<d.sz+14){d.hp-=w.dmg;if(d.hp<=0){d.alive=false;d.falling=true;d.fallV=0;combo++;if(combo>bestCombo)bestCombo=combo;const cm=Math.min(combo,5),pts=100*round*cm;score+=pts;kills++;coinComboTimer=90;coinComboMult=combo>=6?3:combo>=3?2:1;
            const coinGain=Math.floor((10+round*3)*coinComboMult+(combo>=3?combo*5:0));coins+=coinGain;
            if(coinComboMult>1)addFloat(d.x,d.y+18,'🪙x'+coinComboMult,'#FFD700','#FF8F00');const ww=getCurrentWeapon();maxShots=ww.ammo;shots=maxShots;addP(d.x,d.y,25);addShock(d.x,d.y,90);addStarBurst(d.x,d.y);shake(6);addFloat(d.x,d.y-10,combo>=3?'+'+pts+' x'+combo+'!':'+'+pts,combo>=3?'#FF69B4':'#FFD700');playHit();if(combo>=3)playCombo()}else{addP(d.x,d.y,5,['#FFF'])}hitAny=true;break}}}
    if(!hitAny){combo=0;if(shots<=0)playMiss()}
  }

  if(phase==='boss'&&boss&&boss.alive){
    let hitAny=false;
    for(const hp of hitPts){
      if(Math.hypot(boss.x-hp.x,boss.y-hp.y)<boss.sz+15){const dmg=rapidFireActive>0?w.dmg*2:w.dmg;boss.hp-=dmg;boss.flashTimer=8;hitAny=true;addP(boss.x+Math.random()*30-15,boss.y+Math.random()*30-15,8,['#FF4444','#FFA']);addFloat(boss.x,boss.y-boss.sz-10,'-'+dmg,'#FF4444','#FF0000');shake(4);playHit();
        // NEW: chance to drop a health or ammo pickup when the boss is hit
        if(Math.random()<0.12)spawnPickup(boss.x,boss.y);
        if(boss.hp<=0){bossDeath();return}break}
      for(let m of boss.minions){if(!m.alive||m.falling||m.gone)continue;if(Math.hypot(m.x-hp.x,m.y-hp.y)<m.sz+12){m.alive=false;m.falling=true;m.fallV=0;score+=50*round;coins+=5;hitAny=true;addP(m.x,m.y,12);addShock(m.x,m.y,50);playHit();break}}
    }
    if(hitAny&&shots<3)shots=Math.min(maxShots,shots+1);
  }
}

// ===== SHOP CLICK =====
function handleShopClick(mx,my){
  // Tab buttons
  if(my>50&&my<70){if(mx>W/2-120&&mx<W/2-10){shopTab=0;playBuy();return}if(mx>W/2+10&&mx<W/2+120){shopTab=1;playBuy();return}}
  // Next Round
  if(mx>W/2-80&&mx<W/2+80&&my>H-55&&my<H-25){playRoundStart();if(isBossRound(round)){phase='bossWarn';bossWarnTimer=120;playBossWarn()}else{phase='dogAnim';dogVariant='sniff';dogTimer=80}return}

  if(shopTab===0){
    // Weapon shop
    WEAPONS.forEach((w,i)=>{
      const y=82+i*65;const owned=playerWeapons.includes(w.id);const sel=playerWeapons[currentWeaponIdx]===w.id;
      if(mx>W-165&&mx<W-35&&my>y+8&&my<y+30){if(!owned)buyWeapon(w.id);else if(!sel){const idx=playerWeapons.indexOf(w.id);if(idx>=0){currentWeaponIdx=idx;playBuy()}}return}
      if(owned){['dmg','ammo','rate'].forEach((stat,si)=>{const uy=y+34+si*10;if(mx>W-80&&mx<W-30&&my>uy-8&&my<uy+3){upgradeWeapon(w.id,stat)}})}
    });
  }else{
    // Skin shop
    SKINS.forEach((s,i)=>{
      const col=Math.floor(i/5),row=i%5;
      const sx=30+col*385,sy=85+row*62;
      // Buy/Equip button
      if(mx>sx+260&&mx<sx+370&&my>sy+5&&my<sy+30){
        if(!ownedSkins.includes(s.id))buySkin(s.id);

}

function drawPlayerHP(){
  if(phase!=='boss')return;
  const bx=20,by=42,bw=120,bh=10;
  ctx.fillStyle='rgba(0,0,0,.5)';ctx.fillRect(bx-3,by-12,bw+6,bh+16);
  ctx.font="6px 'Press Start 2P',monospace";ctx.fillStyle='#4FC3F7';ctx.fillText('PLAYER HP',bx,by-3);
  ctx.fillStyle='#333';ctx.fillRect(bx,by,bw,bh);
  const pct=playerHP/playerMaxHP;
  ctx.fillStyle=pct>.5?'#4CAF50':pct>.25?'#FF9800':'#F44336';
  ctx.fillRect(bx,by,bw*pct,bh);
  ctx.strokeStyle='#666';ctx.strokeRect(bx,by,bw,bh);
  ctx.fillStyle='#FFF';ctx.font="5px 'Press Start 2P',monospace";ctx.textAlign='center';
  ctx.fillText(playerHP+'/'+playerMaxHP,bx+bw/2,by+8);ctx.textAlign='left';
}

function drawSkillButtons(){
  if(phase!=='boss')return;const sy=H-145;
  skills.forEach((s,i)=>{
    const sx=15+i*90,sw=80,sh=28;const canUse=s.uses>0&&s.cooldown<=0;
    const isActive=(i===0&&rapidFireActive>0)||(i===2&&freezeActive>0);
    ctx.fillStyle=isActive?'rgba(0,200,255,.3)':canUse?'rgba(255,255,255,.12)':'rgba(0,0,0,.4)';
    ctx.fillRect(sx,sy,sw,sh);ctx.strokeStyle=canUse?'#FFD700':'#555';ctx.lineWidth=1.5;ctx.strokeRect(sx,sy,sw,sh);
    if(s.cooldown>0){ctx.fillStyle='rgba(0,0,0,.5)';ctx.fillRect(sx,sy,sw*(s.cooldown/s.maxCd),sh)}
    ctx.font="7px 'Press Start 2P',monospace";ctx.fillStyle=canUse?'#FFF':'#666';ctx.textAlign='center';
    ctx.fillText(s.emoji+' ['+s.key+']',sx+sw/2,sy+12);
    ctx.font="4px 'Press Start 2P',monospace";ctx.fillText(s.uses>0?s.name:'USED',sx+sw/2,sy+22);ctx.textAlign='left';
  });
}

function drawCrosshair(x,y){
  ctx.save();const p=1+Math.sin(tick*.1)*.04;ctx.translate(x,y);ctx.scale(p,p);
  if(playerHitFlash>0&&playerHitFlash%4<2)ctx.globalAlpha=.4;
  ctx.strokeStyle='rgba(255,0,0,.8)';ctx.lineWidth=2.5;ctx.beginPath();ctx.arc(0,0,18,0,Math.PI*2);ctx.stroke();
  ctx.strokeStyle='rgba(255,0,0,.3)';ctx.lineWidth=1;ctx.beginPath();ctx.arc(0,0,26,0,Math.PI*2);ctx.stroke();
  ctx.fillStyle='#f00';ctx.beginPath();ctx.arc(0,0,3,0,Math.PI*2);ctx.fill();
  ctx.strokeStyle='#f00';ctx.lineWidth=2;[[0,-28,0,-10],[0,10,0,28],[-28,0,-10,0],[10,0,28,0]].forEach(([a,b,c,d])=>{ctx.beginPath();ctx.moveTo(a,b);ctx.lineTo(c,d);ctx.stroke()});
  ctx.restore();
}

function drawEffects(){
  shockwaves.forEach(s=>{ctx.globalAlpha=s.life*.6;ctx.strokeStyle=s.color;ctx.lineWidth=3*s.life;ctx.beginPath();ctx.arc(s.x,s.y,s.r,0,Math.PI*2);ctx.stroke()});ctx.globalAlpha=1;
  particles.forEach(p=>{ctx.globalAlpha=p.life/p.maxLife;ctx.fillStyle=p.color;if(p.type==='star'){ctx.save();ctx.translate(p.x,p.y);ctx.rotate(tick*.1);drawSmallStar(ctx,0,0,p.size*.4,p.size);ctx.restore()}else{ctx.beginPath();ctx.arc(p.x,p.y,p.size,0,Math.PI*2);ctx.fill()}});ctx.globalAlpha=1;
  floats.forEach(f=>{const age=tick-f.startTick;ctx.globalAlpha=Math.max(0,1-age/50);ctx.font="bold 14px 'Press Start 2P',monospace";ctx.fillStyle=f.color;ctx.textAlign='center';ctx.shadowColor=f.shadow;ctx.shadowBlur=8;ctx.fillText(f.text,f.x,f.y-age*.8);ctx.shadowBlur=0;ctx.textAlign='left'});ctx.globalAlpha=1;
  if(flashTimer>0){flashTimer--;ctx.globalAlpha=.5;ctx.beginPath();ctx.arc(flashX,flashY,35,0,Math.PI*2);ctx.fillStyle='#FFEB3B';ctx.fill();ctx.globalAlpha=.9;ctx.beginPath();ctx.arc(flashX,flashY,15,0,Math.PI*2);ctx.fillStyle='#FFF';ctx.fill();ctx.globalAlpha=1}
}

// ===== DRAW SHOP =====
function drawShop(){
  ctx.fillStyle='rgba(0,0,0,.88)';ctx.fillRect(0,0,W,H);
  ctx.textAlign='center';ctx.font="16px 'Press Start 2P',monospace";ctx.fillStyle='#FFD700';ctx.shadowColor='#FF6600';ctx.shadowBlur=10;ctx.fillText('SHOP',W/2,32);ctx.shadowBlur=0;
  ctx.font="9px 'Press Start 2P',monospace";ctx.fillText('🪙 '+coins,W/2,48);

  // Tabs
  ['⚔ WEAPONS','🎨 SKINS'].forEach((t,i)=>{
    const tx=W/2-120+i*130,tw=110;
    ctx.fillStyle=shopTab===i?'rgba(255,215,0,.2)':'rgba(255,255,255,.05)';ctx.fillRect(tx,53,tw,16);
    ctx.strokeStyle=shopTab===i?'#FFD700':'#555';ctx.strokeRect(tx,53,tw,16);
    ctx.font="6px 'Press Start 2P',monospace";ctx.fillStyle=shopTab===i?'#FFD700':'#888';ctx.fillText(t,tx+tw/2,64);
  });

  if(shopTab===0){
    // Weapon shop
    ctx.textAlign='left';
    WEAPONS.forEach((w,i)=>{
      const y=82+i*65,owned=playerWeapons.includes(w.id),sel=playerWeapons[currentWeaponIdx]===w.id;
      ctx.fillStyle=sel?'rgba(76,175,80,.15)':owned?'rgba(255,255,255,.05)':'rgba(255,255,255,.02)';
      ctx.fillRect(18,y,W-36,60);ctx.strokeStyle=sel?'#4CAF50':owned?'#444':'#333';ctx.lineWidth=sel?2:1;ctx.strokeRect(18,y,W-36,60);
      ctx.font="9px 'Press Start 2P',monospace";ctx.fillStyle=owned?'#FFF':'#999';ctx.fillText(w.emoji+' '+w.name,30,y+16);
      ctx.font="5px 'Press Start 2P',monospace";ctx.fillStyle='#aaa';ctx.fillText('DMG:'+w.dmg+' AMMO:'+w.ammo+(w.spread?' SPR:'+w.spread:''),30,y+28);ctx.fillText(w.desc,30,y+38);
      if(!owned){const cb=coins>=w.price;ctx.fillStyle=cb?'rgba(76,175,80,.3)':'rgba(60,60,60,.3)';ctx.fillRect(W-165,y+8,125,22);ctx.strokeStyle=cb?'#4CAF50':'#555';ctx.strokeRect(W-165,y+8,125,22);ctx.font="7px 'Press Start 2P',monospace";ctx.fillStyle=cb?'#4CAF50':'#555';ctx.textAlign='center';ctx.fillText('BUY 🪙'+w.price,W-102,y+23);ctx.textAlign='left'}
      else if(sel){ctx.fillStyle='#4CAF50';ctx.font="6px 'Press Start 2P',monospace";ctx.fillText('✓ EQUIPPED',W-160,y+16)}
      else{ctx.fillStyle='rgba(33,150,243,.3)';ctx.fillRect(W-165,y+8,125,22);ctx.strokeStyle='#2196F3';ctx.strokeRect(W-165,y+8,125,22);ctx.font="7px 'Press Start 2P',monospace";ctx.fillStyle='#2196F3';ctx.textAlign='center';ctx.fillText('EQUIP',W-102,y+23);ctx.textAlign='left'}
      if(owned){const up=weaponUpgrades[w.id];[['dmg','DMG'],['ammo','AMM'],['rate','SPD']].forEach(([stat,lbl],si)=>{const lvl=up[stat],cost=getUpgradeCost(w.id,stat),ux=W-165,uy=y+36+si*10;ctx.font="4px 'Press Start 2P',monospace";ctx.fillStyle='#aaa';ctx.fillText(lbl,ux,uy);for(let l=0;l<5;l++){ctx.fillStyle=l<lvl?'#FFD700':'#333';ctx.fillRect(ux+28+l*9,uy-5,6,5)}if(lvl<5){ctx.fillStyle=coins>=cost?'#FFD700':'#555';ctx.fillText('+🪙'+cost,ux+80,uy)}else{ctx.fillStyle='#4CAF50';ctx.fillText('MAX',ux+80,uy)}})}
    });
  }else{
    // Skin shop
    ctx.textAlign='left';
    SKINS.forEach((s,i)=>{
      const col=Math.floor(i/5),row=i%5;
      const sx=25+col*385,sy=80+row*62;
      const owned=ownedSkins.includes(s.id),eq=equippedSkin===s.id;
      ctx.fillStyle=eq?'rgba(76,175,80,.15)':owned?'rgba(255,255,255,.05)':'rgba(255,255,255,.02)';
      ctx.fillRect(sx,sy,375,56);ctx.strokeStyle=eq?'#4CAF50':owned?'#444':'#333';ctx.lineWidth=eq?2:1;ctx.strokeRect(sx,sy,375,56);

      // Color preview bar
      const pg=ctx.createLinearGradient(sx+8,0,sx+58,0);pg.addColorStop(0,s.c1);pg.addColorStop(1,s.c2);
      ctx.fillStyle=pg;ctx.fillRect(sx+8,sy+8,50,12);
      if(s.glow){ctx.strokeStyle=s.glow;ctx.lineWidth=1;ctx.shadowColor=s.glow;ctx.shadowBlur=6;ctx.strokeRect(sx+8,sy+8,50,12);ctx.shadowBlur=0}
      ctx.fillStyle=s.barrel;ctx.fillRect(sx+8,sy+24,50,8);

      ctx.font="7px 'Press Start 2P',monospace";ctx.fillStyle=owned?'#FFF':'#ccc';ctx.fillText(s.name,sx+68,sy+18);
      ctx.font="5px 'Press Start 2P',monospace";ctx.fillStyle='#aaa';ctx.fillText(s.price===0?'FREE':'🪙 '+s.price,sx+68,sy+32);
      if(s.glow)ctx.fillText('✨ GLOW + TRAIL',sx+68,sy+44);

      // Button
      if(!owned){const cb=coins>=s.price;ctx.fillStyle=cb?'rgba(76,175,80,.3)':'rgba(60,60,60,.2)';ctx.fillRect(sx+270,sy+10,95,22);ctx.strokeStyle=cb?'#4CAF50':'#555';ctx.strokeRect(sx+270,sy+10,95,22);ctx.font="6px 'Press Start 2P',monospace";ctx.fillStyle=cb?'#4CAF50':'#555';ctx.textAlign='center';ctx.fillText('BUY',sx+317,sy+24);ctx.textAlign='left'}
      else if(eq){ctx.fillStyle='#4CAF50';ctx.font="6px 'Press Start 2P',monospace";ctx.fillText('✓ ON',sx+285,sy+24)}
      else{ctx.fillStyle='rgba(33,150,243,.3)';ctx.fillRect(sx+270,sy+10,95,22);ctx.strokeStyle='#2196F3';ctx.strokeRect(sx+270,sy+10,95,22);ctx.font="6px 'Press Start 2P',monospace";ctx.fillStyle='#2196F3';ctx.textAlign='center';ctx.fillText('EQUIP',sx+317,sy+24);ctx.textAlign='left'}
    });
  }

  // Next Round button
  ctx.fillStyle='rgba(76,175,80,.4)';ctx.fillRect(W/2-80,H-55,160,28);ctx.strokeStyle='#4CAF50';ctx.lineWidth=2;ctx.strokeRect(W/2-80,H-55,160,28);
  ctx.font="9px 'Press Start 2P',monospace";ctx.fillStyle='#FFF';ctx.textAlign='center';
  ctx.fillText(isBossRound(round)?'⚠ BOSS ROUND':'NEXT ROUND ▶',W/2,H-37);ctx.textAlign='left';
}

function drawDog(x,y,v){ctx.save();ctx.translate(x,y);if(v==='sniff'){ctx.beginPath();ctx.ellipse(0,0,22,16,0,0,Math.PI*2);ctx.fillStyle='#8B4513';ctx.fill();ctx.beginPath();ctx.arc(20,-8,12,0,Math.PI*2);ctx.fillStyle='#A0522D';ctx.fill();ctx.beginPath();ctx.ellipse(14,-18,5,9,0,0,Math.PI*2);ctx.fillStyle='#6B3410';ctx.fill();ctx.beginPath();ctx.ellipse(30,-6,4,3,0,0,Math.PI*2);ctx.fillStyle='#D2691E';ctx.fill();ctx.beginPath();ctx.arc(33,-7,2,0,Math.PI*2);ctx.fillStyle='#000';ctx.fill();ctx.beginPath();ctx.arc(24,-12,2,0,Math.PI*2);ctx.fillStyle='#000';ctx.fill();ctx.strokeStyle='#8B4513';ctx.lineWidth=4;ctx.beginPath();ctx.moveTo(-22,-5);ctx.quadraticCurveTo(-32,-20,-26,-25);ctx.stroke();ctx.beginPath();ctx.moveTo(-10,16);ctx.lineTo(-10,24);ctx.stroke();ctx.beginPath();ctx.moveTo(8,16);ctx.lineTo(8,24);ctx.stroke();ctx.beginPath();ctx.arc(-6,-3,6,0,Math.PI*2);ctx.fillStyle='#F5DEB3';ctx.fill()}else if(v==='laugh'){ctx.beginPath();ctx.ellipse(0,0,18,20,0,0,Math.PI*2);ctx.fillStyle='#8B4513';ctx.fill();ctx.beginPath();ctx.ellipse(0,5,12,14,0,0,Math.PI*2);ctx.fillStyle='#F5DEB3';ctx.fill();ctx.beginPath();ctx.arc(0,-24,14,0,Math.PI*2);ctx.fillStyle='#A0522D';ctx.fill();ctx.beginPath();ctx.ellipse(-10,-36,5,9,0,0,Math.PI*2);ctx.fillStyle='#6B3410';ctx.fill();ctx.beginPath();ctx.ellipse(10,-36,5,9,0,0,Math.PI*2);ctx.fillStyle='#6B3410';ctx.fill();ctx.beginPath();ctx.ellipse(0,-18,6,4,0,0,Math.PI*2);ctx.fillStyle='#000';ctx.fill();ctx.strokeStyle='#000';ctx.lineWidth=2;ctx.beginPath();ctx.moveTo(-6,-28);ctx.quadraticCurveTo(-4,-26,-2,-28);ctx.stroke();ctx.beginPath();ctx.moveTo(2,-28);ctx.quadraticCurveTo(4,-26,6,-28);ctx.stroke();ctx.beginPath();ctx.ellipse(-18,-10,6,5,0,0,Math.PI*2);ctx.fillStyle='#A0522D';ctx.fill();ctx.beginPath();ctx.ellipse(18,-10,6,5,0,0,Math.PI*2);ctx.fillStyle='#A0522D';ctx.fill()}else if(v==='hold'){ctx.beginPath();ctx.ellipse(0,0,18,20,0,0,Math.PI*2);ctx.fillStyle='#8B4513';ctx.fill();ctx.beginPath();ctx.ellipse(0,5,12,14,0,0,Math.PI*2);ctx.fillStyle='#F5DEB3';ctx.fill();ctx.beginPath();ctx.arc(0,-24,14,0,Math.PI*2);ctx.fillStyle='#A0522D';ctx.fill();ctx.beginPath();ctx.ellipse(-10,-36,5,9,0,0,Math.PI*2);ctx.fillStyle='#6B3410';ctx.fill();ctx.beginPath();ctx.ellipse(10,-36,5,9,0,0,Math.PI*2);ctx.fillStyle='#6B3410';ctx.fill();ctx.beginPath();ctx.arc(-5,-27,2,0,Math.PI*2);ctx.fillStyle='#000';ctx.fill();ctx.beginPath();ctx.arc(5,-27,2,0,Math.PI*2);ctx.fillStyle='#000';ctx.fill();ctx.strokeStyle='#000';ctx.lineWidth=1.5;ctx.beginPath();ctx.moveTo(-4,-20);ctx.quadraticCurveTo(0,-16,4,-20);ctx.stroke();ctx.beginPath();ctx.ellipse(0,-44,12,8,0,0,Math.PI*2);ctx.fillStyle='#4CAF50';ctx.fill();ctx.beginPath();ctx.ellipse(-10,-8,6,5,0,0,Math.PI*2);ctx.fillStyle='#A0522D';ctx.fill();ctx.beginPath();ctx.ellipse(10,-8,6,5,0,0,Math.PI*2);ctx.fillStyle='#A0522D';ctx.fill()}ctx.restore()}

function drawBossWarn(){const f=Math.sin(tick*.2)>0;ctx.fillStyle=f?'rgba(180,0,0,.15)':'rgba(0,0,0,.3)';ctx.fillRect(0,0,W,H);ctx.textAlign='center';ctx.font="26px 'Press Start 2P',monospace";ctx.fillStyle='#F44336';ctx.shadowColor='#F44336';ctx.shadowBlur=20;ctx.fillText('⚠ BOSS BATTLE ⚠',W/2,H/2-20);ctx.shadowBlur=0;ctx.font="11px 'Press Start 2P',monospace";ctx.fillStyle='#FF8A65';ctx.fillText('ROUND '+round,W/2,H/2+15);ctx.font="7px 'Press Start 2P',monospace";ctx.fillStyle='#aaa';ctx.fillText('FIRE • BOMB • SPRAY • ENRAGE!',W/2,H/2+40);ctx.textAlign='left'}

function drawTitle(){ctx.fillStyle='rgba(0,0,0,.5)';ctx.fillRect(0,0,W,H);ctx.textAlign='center';const b=Math.sin(tick*.05)*5;ctx.font="26px 'Press Start 2P',monospace";ctx.shadowColor='#FF6600';ctx.shadowBlur=20;ctx.fillStyle='#FFD700';ctx.fillText('DUCK HUNT',W/2,105+b);ctx.shadowBlur=0;ctx.font="9px 'Press Start 2P',monospace";ctx.fillStyle='#FF8A65';ctx.fillText('FAMILY EDITION ULTIMATE',W/2,135);ctx.font="6px 'Press Start 2P',monospace";ctx.fillStyle='#aaa';ctx.fillText('🔫 WEAPONS  🎨 SKINS  👑 BOSSES  ⚡ SKILLS  💀 BOSS ATTACKS',W/2,160);
let fx=W/2-90;FACE_KEYS.forEach((k,i)=>{const img=faceImgs[k],wb=Math.sin(tick*.06+i*1.5)*8;if(img&&img.complete){ctx.save();ctx.beginPath();ctx.arc(fx+i*60,220+wb,25,0,Math.PI*2);ctx.clip();ctx.drawImage(img,fx+i*60-25,220+wb-25,50,50);ctx.restore();ctx.beginPath();ctx.arc(fx+i*60,220+wb,26,0,Math.PI*2);ctx.strokeStyle='#FFD700';ctx.lineWidth=2;ctx.stroke()}});
if(Math.floor(tick/28)%2===0){ctx.font="12px 'Press Start 2P',monospace";ctx.fillStyle='#fff';ctx.fillText('CLICK TO START',W/2,310)}ctx.textAlign='left'}

function drawGameOver(){ctx.fillStyle='rgba(0,0,0,.78)';ctx.fillRect(0,0,W,H);ctx.textAlign='center';ctx.font="26px 'Press Start 2P',monospace";ctx.shadowColor='#F44336';ctx.shadowBlur=15;ctx.fillStyle='#F44336';ctx.fillText('GAME OVER',W/2,130);ctx.shadowBlur=0;
if(playerHP<=0&&phase==='gameOver'){ctx.font="8px 'Press Start 2P',monospace";ctx.fillStyle='#FF8A65';ctx.fillText('DEFEATED BY THE BOSS!',W/2,160)}
ctx.font="12px 'Press Start 2P',monospace";ctx.fillStyle='#FFD700';ctx.fillText('SCORE: '+String(score).padStart(7,'0'),W/2,200);ctx.font="9px 'Press Start 2P',monospace";ctx.fillStyle='#aaa';ctx.fillText('ROUND '+round+' | COINS: '+coins,W/2,230);
if(Math.floor(tick/28)%2===0){ctx.font="11px 'Press Start 2P',monospace";ctx.fillStyle='#fff';ctx.fillText('CLICK TO RESTART',W/2,310)}ctx.textAlign='left'}

// ===== MAIN DRAW =====
function draw(){
  ctx.clearRect(0,0,W,H);ctx.save();ctx.translate(screenShake.x,screenShake.y);
  drawSky();drawSun();drawMountains();drawClouds();drawBgBirds();drawTrees();
  if(phase==='playing')ducks.forEach(d=>{if(!d.gone)drawTarget(d)});
  if(phase==='boss'&&boss){boss.minions.forEach(m=>{if(!m.gone)drawTarget(m)});drawBoss();drawBossAttacks();drawPickups()}
  drawGround();drawEffects();
  if(phase==='dogAnim'&&dogVariant){drawDog(400,GROUND_Y+22,dogVariant);ctx.textAlign='center';ctx.font="14px 'Press Start 2P',monospace";if(dogVariant==='laugh'){ctx.fillStyle='#FF5722';ctx.fillText('HA HA HA!',W/2,190)}else if(dogVariant==='hold'){ctx.fillStyle='#4CAF50';ctx.fillText('NICE SHOT!',W/2,180);ctx.font="8px 'Press Start 2P',monospace";ctx.fillStyle='#FFD700';ctx.fillText('+'+Math.floor(50+round*20)+' COINS',W/2,205)}else{ctx.fillStyle='#FFD700';ctx.fillText('ROUND '+round,W/2,180)}ctx.textAlign='left'}
  if(phase==='playing'||phase==='boss')drawGunWithSkin();
  if(phase==='playing'||phase==='boss'){drawCrosshair(mouseX,mouseY);canvas.style.cursor='none'}else canvas.style.cursor='pointer';
  ctx.restore();
  if(phase==='playing'||phase==='boss'||phase==='dogAnim')drawHUD();
  if(phase==='boss'){drawBossHP();drawPlayerHP();drawSkillButtons();
    if(boss&&boss.alive&&boss.enraged&&Math.floor(tick/15)%2===0){ctx.textAlign='center';ctx.font="12px 'Press Start 2P',monospace";ctx.fillStyle='#FF1744';ctx.shadowColor='#FF1744';ctx.shadowBlur=12;ctx.fillText('⚠ BOSS ENRAGED ⚠',W/2,boss.y-boss.sz-30>40?boss.y-boss.sz-30:95);ctx.shadowBlur=0;ctx.textAlign='left'}}
  if(phase==='title')drawTitle();
  if(phase==='gameOver')drawGameOver();
  if(phase==='shop')drawShop();
  if(phase==='bossWarn')drawBossWarn();
}

function gameLoop(){update();draw();requestAnimationFrame(gameLoop)}

// ===== INPUT =====
function getPos(e){const r=canvas.getBoundingClientRect();return{x:(e.clientX-r.left)*(W/r.width),y:(e.clientY-r.top)*(H/r.height)}}
canvas.addEventListener('mousemove',e=>{const p=getPos(e);mouseX=p.x;mouseY=p.y});
canvas.addEventListener('click',e=>{const p=getPos(e);handleShoot(p.x,p.y)});
canvas.addEventListener('touchstart',e=>{e.preventDefault();const t=e.touches[0];if(!t)return;const r=canvas.getBoundingClientRect();const px=(t.clientX-r.left)*(W/r.width),py=(t.clientY-r.top)*(H/r.height);mouseX=px;mouseY=py;handleShoot(px,py)},{passive:false});
canvas.addEventListener('touchmove',e=>{e.preventDefault();const t=e.touches[0];if(!t)return;const r=canvas.getBoundingClientRect();mouseX=(t.clientX-r.left)*(W/r.width);mouseY=(t.clientY-r.top)*(H/r.height)},{passive:false});
document.addEventListener('keydown',e=>{if(e.key==='1')useSkill(0);else if(e.key==='2')useSkill(1);else if(e.key==='3')useSkill(2)});

gameLoop();
</script>
